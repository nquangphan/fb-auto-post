name: Build Windows Installer

# Builds the one-click NSIS installer on a real Windows runner (native better-sqlite3
# rebuild + Windows Playwright Chromium bundle — see docs/packaging.md). Runs on every
# push to main and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win

      # Guard: the app spawns bundled Chromium from app.asar.unpacked at runtime.
      # If chrome.exe is missing there (browser not bundled / not unpacked), every
      # launch fails with ENOENT on the client. Fail the build here instead of
      # shipping a broken installer.
      - name: Verify bundled Chromium is unpacked
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Path dist/win-unpacked/resources/app.asar.unpacked -Filter chrome.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'chromium-\d+\\chrome-win64\\chrome.exe' } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "Bundled Chromium chrome.exe NOT found under app.asar.unpacked — installer would fail with spawn ENOENT on the client."
            exit 1
          }
          Write-Host "OK: bundled Chromium found at $($exe.FullName)"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fb-auto-post-windows-installer
          path: dist/*.exe
          if-no-files-found: error
