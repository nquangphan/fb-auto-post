name: Build Windows Installer

# Builds the one-click NSIS installer on a real Windows runner (native better-sqlite3
# rebuild + Windows Playwright Chromium bundle — see docs/packaging.md). Runs on every
# push to main and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fb-auto-post-windows-installer
          path: dist/*.exe
          if-no-files-found: error
